<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>All Posts — Bon Sitaula</title>
  <link rel="stylesheet" href="shared.css" />
  <style>
    .page-header {
      padding: 60px 0 40px;
      border-bottom: 1px solid var(--border);
    }
    .page-eyebrow {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 12px;
    }
    .page-header h1 {
      font-size: clamp(28px, 5vw, 42px);
      font-weight: 800;
      letter-spacing: -1.5px;
      line-height: 1.1;
    }
    .page-header p {
      margin-top: 12px;
      font-size: 16px;
      color: var(--text-muted);
    }
    .post-list { padding: 8px 0 64px; }
    .post-item {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
      padding: 20px 0;
      border-bottom: 1px solid var(--border);
      text-decoration: none;
      color: inherit;
    }
    .post-item:last-child { border-bottom: none; }
    .post-item:hover .post-title { color: var(--accent); }
    .post-left { display: flex; flex-direction: column; gap: 5px; min-width: 0; }
    .post-title {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.2px;
      color: var(--text);
      transition: color 0.15s;
    }
    .post-tags { display: flex; gap: 6px; flex-wrap: wrap; }
    .tag {
      font-size: 11px; font-weight: 600; letter-spacing: 0.4px;
      text-transform: uppercase; color: var(--tag-text);
      background: var(--tag-bg); border-radius: 4px; padding: 2px 7px;
    }
    .post-meta { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .post-date { font-size: 13px; color: var(--text-muted); white-space: nowrap; }
    .post-read-time { font-size: 12px; color: var(--text-faint); white-space: nowrap; }
    @media (max-width: 480px) {
      .post-item { flex-direction: column; gap: 6px; }
      .post-read-time { display: none; }
    }
  </style>
</head>
<body>
  <nav>
    <div class="inner">
      <span class="nav-logo">cd ~<span class="cursor"></span></span>
      <div class="nav-links">
        <a href="../index.html" class="back-link hide-mobile">← Home</a>
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
          <span class="toggle-icon" id="toggleIcon">☀️</span>
          <span class="toggle-label" id="toggleLabel">Light</span>
        </button>
      </div>
    </div>
  </nav>

  <div class="container">
    <header class="page-header">
      <p class="page-eyebrow">Writing</p>
      <h1>All Posts</h1>
      <p>Thoughts on life, code, and everything in between.</p>
    </header>

    <div class="post-list" id="posts-list">
      <p style="color:var(--text-muted);font-size:14px;padding:20px 0">Loading…</p>
    </div>

    <footer>
      <div class="footer-inner">
        <span class="footer-copy">© 2026 Bon Sitaula</span>
        <div class="footer-links">
          <a href="https://github.com/CuriousCilantro" target="_blank" rel="noopener">GitHub</a>
          <a href="../index.html">Home</a>
        </div>
      </div>
    </footer>
  </div>

  <script>
    const toggle = document.getElementById('themeToggle');
    const icon = document.getElementById('toggleIcon');
    const label = document.getElementById('toggleLabel');
    const html = document.documentElement;
    const saved = localStorage.getItem('theme');
    if (saved) applyTheme(saved);
    toggle.addEventListener('click', () => {
      const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      applyTheme(next);
      localStorage.setItem('theme', next);
    });
    function applyTheme(theme) {
      html.setAttribute('data-theme', theme);
      icon.textContent = theme === 'dark' ? '☀️' : '🌙';
      label.textContent = theme === 'dark' ? 'Light' : 'Dark';
    }

    fetch('manifest.json')
      .then(r => r.json())
      .then(posts => {
        document.getElementById('posts-list').innerHTML = posts.map(p => `
          <a href="post.html?slug=${p.slug}" class="post-item">
            <div class="post-left">
              <span class="post-title">${p.title}</span>
              <div class="post-tags">
                ${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}
              </div>
            </div>
            <div class="post-meta">
              <span class="post-read-time">${p.readTime}</span>
              <span class="post-date">${p.date}</span>
            </div>
          </a>`).join('');
      });
  </script>
</body>
</html>
